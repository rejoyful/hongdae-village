name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # anon(publishable) key는 클라이언트 공개용으로 설계된 값 — RLS가 데이터 보호
      VITE_SUPABASE_URL: https://nxgrclwrjwdqvvhzihes.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_2qzMQ3L4IgMAsE9xpCv9ow_4Uzc3N7Y
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
